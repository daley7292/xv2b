mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

dns:
  enable: true
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://doh.dns.sb/dns-query
    - https://dns.cloudflare.com/dns-query
    - https://dns.twnic.tw/dns-query
    - tls://8.8.4.4:853
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32

proxies:
proxy-groups:
  - { name: "🚀 节点选择", type: select, proxies: ["🔯 故障转移","🚄 高速公网"] }
  - { name: "🔯 故障转移", type: fallback, proxies: [/^(?!.*(?:重置|到期|流量|套餐|官网|订阅|游戏)).*$/], url: "http://google.com", interval: 300 }
  - { name: "🚄 高速公网", type: url-test, proxies: [/^(?!.*(?:重置|到期|流量|套餐|官网|订阅|游戏)).*$/], url: "http://google.com", interval: 300 }
  - { name: "📺 巴哈姆特", type: select, proxies: ["🚀 节点选择"] }
  - { name: "🎙 Discord", type: select, proxies: ["🚀 节点选择"] }
  - { name: "📘 Facebook", type: select, proxies: ["🚀 节点选择"] }
  - { name: "🌍 国外媒体", type: select, proxies: ["🚀 节点选择"] }
  - { name: "📲 电报信息", type: select, proxies: ["🚀 节点选择"] }
  - { name: "🍎 苹果服务", type: select, proxies: ["🚀 节点选择","DIRECT"] }

